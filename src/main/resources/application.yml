spring:
  datasource:
    url: jdbc:mysql://localhost:3307/filestorage
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update #validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: filestorage

jwt:
  secret: yourSecretKeyForJWTTokenGenerationAndValidation2024
  expiration: 86400000